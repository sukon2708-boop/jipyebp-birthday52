<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Letter</title>


<link href="https://fonts.googleapis.com/css2?family=Fahkwang:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(#fde2e6,#f7bfc8);
  font-family:'Fahkwang',sans-serif;
  min-height: 100svh;
  padding: 16px;
  box-sizing: border-box;
}

/* ================= Envelope ================= */
.envelope{
  position:relative;
  width:320px;
  height:213px;
  background:#fb6f92;
  cursor:pointer;
  box-shadow:
    0 2px 0 #ffadc0,
    0 4px 0 #fb6f92,
    0 6px 0 #f15f88,
    0 8px 0 #e6527d,
    0 14px 30px rgba(230,82,125,.35);
  border-radius:4px;
  transform: scale(1);
  transition: transform 0.3s ease;
}

/* ================= Letter ================= */
.envelope__letter{
  position:absolute;
  left:50%;
  margin:auto;
  top:20px;
  width:80%;
  height:120px;
  background:#fff;
  padding:18px;
  color:#555;
  font-size:14px;
  line-height:1.6;
  box-shadow:0 4px 10px rgba(0,0,0,.15);
  z-index:0;
  overflow:hidden;
  transform: translate(-50%, 140px);
  opacity:0;
  transition:
    transform 1.1s cubic-bezier(.22,.61,.36,1),
    opacity .6s ease;
  will-change: transform;
}

/* zoom mode */
.envelope__letter.zoom{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
  max-width:420px;
  height:auto;
  max-height:80vh;
  padding:28px;
  z-index:999;
  font-size:16px;
  overflow:auto;
  box-shadow:0 25px 60px rgba(0,0,0,.35);
  border-radius:14px;
}

/* =============== Triangles ================= */
.envelope__triangle{
  position:absolute;
  width:0;
  height:0;
}

/* left */
.envelope__triangle--left{
  border-top:212px solid transparent;
  border-right:319px solid #e6527d;
  bottom:0;
  left:0;
  z-index:2;
}

/* right */
.envelope__triangle--right{
  border-top:106px solid transparent;
  border-bottom:106px solid transparent;
  border-left:160px solid #f15f88;
  bottom:0;
  right:0;
  z-index:2;
}

/* flap */
.envelope__triangle--down{
  border-left:160px solid transparent;
  border-right:160px solid transparent;
  border-top:106px solid #ffadc0;
  top:0;
  left:0;
  transform-origin:top;
  transition:1s cubic-bezier(.3,1,.3,1);
  z-index:3;
}

.envelope::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:4px;
  box-shadow: inset 0 -6px 12px rgba(255,255,255,.25);
  pointer-events:none;
}

/* ================= OPEN ================= */
.envelope.is-open{
  z-index:4; 
}

.envelope.is-open .envelope__triangle--down{
  transform:translateY(-106px) scaleY(-1);
  z-index:0;
}

.envelope.is-open .envelope__letter{
  transform: translate(-50%, -90px);
  transition-delay: .15s;
  height:210px;
  z-index:3;
  opacity:1;
}

/* ================= Buttons ================= */
.btn-group{
  margin-top:35px;
  display:flex;
  gap:18px;
  opacity:0;
  transform:translateY(12px);
  transition:.4s ease;
}

.btn-group.show{
  opacity:1;
  transform:translateY(0);
}

button{
  font-family:'Fahkwang',sans-serif;
  font-size:15px;
  font-weight:600;
  padding:12px 34px;
  border-radius:30px;
  cursor:pointer;
  transition:.25s ease;
}

/* back */
.back-btn{
  background:transparent;
  border:2px solid #fb6f92;
  color:#fb6f92;
}

.back-btn:hover{
  background:#fb6f92;
  color:#fff;
}

/* next */
.next-btn{
  border:none;
  background:linear-gradient(135deg,#fb6f92,#ff9db4);
  color:#fff;
}

.next-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(251,111,146,.4);
}

/* overlay (เอาไว้แต่ไม่มืด) */
.overlay{
  display:none; /* ไม่โชว์พื้นหลังมืด */
}

/* ================= MOBILE SCALE ONLY ================= */
@media (max-width: 420px){
  .envelope{
    transform: scale(0.9);
  }
}

@media (max-width: 360px){
  .envelope{
    transform: scale(0.85);
  }
}

/* ===============================
   MOBILE SIZE FIX (ADD ONLY)
   =============================== */

/* ใช้ความสูงจอมือถือจริง */
body{
  min-height: 100svh;
}

/* กันเนื้อหาชิดขอบและป้องกันซูมแปลก */
body{
  padding-left: 16px;
  padding-right: 16px;
  box-sizing: border-box;
}

/* ป้องกันหน้าเว็บกว้างเกินจอ */
html{
  overflow-x: hidden;
}

</style>
</head>

<body>

<div class="overlay" id="overlay"></div>

<div class="envelope" id="envelope">
  <div class="envelope__letter" id="letter">
    <strong>ถึงเธอ </strong><br><br>
Happy Birthday! May this special day bring you joy, good health, success, and countless wonderful memories. 
ขอให้เป็น 33 ขวบที่สดใสตลอดปีและตลอดไปน้าา
    <br><br>
  </div>

  <div class="envelope__triangle envelope__triangle--down"></div>
  <div class="envelope__triangle envelope__triangle--right"></div>
  <div class="envelope__triangle envelope__triangle--left"></div>
</div>

<div class="btn-group" id="btnGroup">
  <button class="back-btn" onclick="goBack()">ย้อนกลับ</button>
  <button class="next-btn" onclick="goNext()">ถัดไป</button>
</div>

<audio id="openSound" src="open.mp3" preload="auto"></audio>

<script>
const envelope = document.getElementById("envelope");
const letter = document.getElementById("letter");
const btnGroup = document.getElementById("btnGroup");
const overlay = document.getElementById("overlay");
const sound = document.getElementById("openSound");

let opened = false;

envelope.addEventListener("click", ()=>{
  if(!opened){
    envelope.classList.add("is-open");
    opened = true;
    sound.play().catch(()=>{});
    setTimeout(()=>btnGroup.classList.add("show"),900);
  }
});

letter.addEventListener("click",(e)=>{
  e.stopPropagation();
  letter.classList.toggle("zoom");
  // overlay ไม่ toggle แล้ว
});

overlay.addEventListener("click",()=>{
  // overlay ไม่ทำอะไร
});

function goBack(){
  window.history.back();
}

function goNext(){
  window.location.href = "memory.html";
}
</script>

</body>
</html>
